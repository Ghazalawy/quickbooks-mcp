name: One-time — Authorize yahoo-mail-mcp deploy key

on:
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stage pubkey file
        run: |
          cat > /tmp/yahoo_pubkey <<'PUBKEY'
          ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPhkCQrzuKP24BeG9gd2JnKO0v06GHwsbkOLDFQfx3UT yahoo-mail-mcp deploy key 2026-05-14
          PUBKEY
          cat /tmp/yahoo_pubkey

      - name: Upload pubkey to server
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/yahoo_pubkey "${SSH_USER}@${SSH_HOST}:/tmp/yahoo_pubkey"

      - name: Append to authorized_keys (idempotent)
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" bash <<'REMOTE'
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if grep -qF "yahoo-mail-mcp deploy key 2026-05-14" ~/.ssh/authorized_keys 2>/dev/null; then
            echo "ALREADY_AUTHORIZED"
          else
            cat /tmp/yahoo_pubkey >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "AUTHORIZED"
          fi
          rm -f /tmp/yahoo_pubkey
          # Show last 3 keys for confirmation
          echo "--- authorized_keys tail ---"
          tail -3 ~/.ssh/authorized_keys | sed 's/\(AAAA[^ ]\{20\}\).*\( .*\)/\1...\2/'
          REMOTE

      - name: Cleanup local key
        if: always()
        run: rm -f ~/.ssh/deploy_key
